# DTWorkflow PoC - Docker Compose 配置
# 用于本地验证 Claude Code CLI 在容器中的可行性
version: "3.8"

services:
  claude-worker:
    # 基于本地 Dockerfile 构建镜像
    build:
      context: .
      dockerfile: Dockerfile
    image: dtworkflow-claude-worker:poc

    # 保持容器运行，便于交互式调试
    stdin_open: true
    tty: true

    # 通过环境变量注入 Anthropic API Key（从 .env 文件读取）
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # API Base URL（可选，使用代理时设置）
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      # 设置 Claude Code 非交互模式，适合自动化场景
      - CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1

    # 将本地 test-workspace 目录挂载到容器工作目录
    volumes:
      - ./test-workspace:/workspace

    # 资源限制：防止单个容器占用过多资源
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 512M

    # 网络配置：使用默认 bridge 网络，确保能同时访问内网和外网
    networks:
      - dtworkflow-poc

networks:
  dtworkflow-poc:
    driver: bridge
    # 允许容器访问宿主机网络（内网服务如 Gitea）
    driver_opts:
      com.docker.network.bridge.name: dtworkflow0
