volumes:
  redis-data:
  app-data:
  maven-cache: # Maven 依赖缓存，在 fix/gen_tests 容器间共享复用
    name: dtworkflow-maven-cache # 固定名称，避免 compose 项目名前缀干扰

services:
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - dtworkflow-net
    restart: unless-stopped

  dtworkflow:
    build:
      context: .
      dockerfile: build/Dockerfile
    command: ["serve", "--config", "/app/dtworkflow.yaml"]
    ports:
      # 绑定所有接口，允许局域网 Webhook 回调；生产环境建议通过反向代理限制访问
      - "0.0.0.0:8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # macOS Docker Desktop: docker.sock 在容器内属 root:root(GID 0)，需加入 root 组才能访问
    group_add:
      - "0"
    environment:
      # 容器内网络：Redis 通过 compose 服务名访问（覆盖 yaml 中的 localhost:6379）
      - DTWORKFLOW_REDIS_ADDR=redis:6379
      # 容器内数据库路径（覆盖 yaml 中的相对路径）
      - DTWORKFLOW_DATABASE_PATH=/app/data/dtworkflow.db
      # Maven 缓存 named volume 名称（dtworkflow 以此名挂载到 worker 容器）
      - DTWORKFLOW_WORKER_MAVEN_CACHE_VOLUME=dtworkflow-maven-cache
    volumes:
      # 挂载统一配置文件（M1.8 配置体系），敏感信息通过 yaml 文件管理而非散落在 env 中
      - ./dtworkflow.yaml:/app/dtworkflow.yaml:ro
      - app-data:/app/data
      # 警告：Docker socket 挂载赋予容器完整 Docker 控制权限。
      # 这是 Worker 管理容器的必要条件，后续考虑使用 Docker API over TCP + TLS。
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - dtworkflow-net
    restart: unless-stopped

  # Worker 镜像构建服务（仅用于构建，不运行）
  # 使用方式: docker compose --profile build build worker-image
  worker-image:
    build:
      context: .
      dockerfile: build/docker/Dockerfile.worker
    image: dtworkflow-worker:1.0
    profiles:
      - build

networks:
  dtworkflow-net:
    driver: bridge
