services:
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - dtworkflow-net
    restart: unless-stopped

  dtworkflow:
    build:
      context: .
      dockerfile: build/Dockerfile
    command: ["serve"]
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      - DTWORKFLOW_REDIS_ADDR=redis:6379
      - DTWORKFLOW_DB_PATH=/app/data/dtworkflow.db
      - DTWORKFLOW_WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - DTWORKFLOW_GITEA_URL=${GITEA_URL}
      - DTWORKFLOW_GITEA_TOKEN=${GITEA_TOKEN}
      - DTWORKFLOW_CLAUDE_API_KEY=${CLAUDE_API_KEY}
    volumes:
      - ./data:/app/data
      # 警告：Docker socket 挂载赋予容器完整 Docker 控制权限。
      # 这是 Worker 管理容器的必要条件，后续考虑使用 Docker API over TCP + TLS。
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - dtworkflow-net
    restart: unless-stopped

volumes:
  redis-data:

networks:
  dtworkflow-net:
    driver: bridge
