# DTWorkflow 配置文件模板
# 复制为 dtworkflow.yaml 后修改

# 服务器配置
server:
  host: "0.0.0.0"
  port: 8080

# Gitea 配置
gitea:
  url: "https://your-gitea-instance.com"
  token: ""
  # 自签名证书时设为 true
  insecure_skip_verify: false

# Redis 配置
redis:
  addr: "localhost:6379"
  password: ""
  db: 0

# 数据库配置（SQLite，纯 Go 实现）
database:
  path: "data/dtworkflow.db"

# 日志配置
log:
  level: "info"    # debug / info / warn / error
  format: "text"   # text / json

# Worker 配置
worker:
  concurrency: 3
  timeout: "30m"
