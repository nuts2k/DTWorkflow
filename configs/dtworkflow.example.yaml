# DTWorkflow 配置文件模板
# 复制为 dtworkflow.yaml 后修改。
#
# 注意：该示例配置应能被 internal/config 的 Manager.Load 正常读取并通过当前校验。

# 服务器配置
server:
  host: "0.0.0.0"
  port: 8080

# Gitea 配置
# 说明：gitea.url 必填；token 体系按职能拆分（规避 Gitea"同一账号不能评审自己创建的 PR"的限制）。
#
# Token 使用规则：
#   - tokens.review：评审账号，用于 review.Writer 发 Review、只读 API 预校验、Gitea 通知评论；
#                    同时作为 review_pr / analyze_issue 任务容器内 git clone 的 token。
#   - tokens.fix   ：修复账号，用于 fix.Service 创建 auto-fix PR、Issue 评论；
#                    同时作为 fix_issue 任务容器内 git push 到 auto-fix/* 分支的 token。
#   - tokens.gen_tests：测试生成账号，用于 gen_tests 创建/清理 auto-test PR 与分支；
#                    同时作为 gen_tests 任务容器内 git push 到 auto-test/* 分支的 token。
#   - token        ：基础 token，必填。上面三个子 token 留空时回退使用；
#                    单账号部署（旧行为）只填该字段即可，与拆分前完全兼容。
# 推荐：生产环境为 review、fix、gen_tests 建独立 Gitea 账号，自动创建的 PR 由 review 账号评审。
gitea:
  url: "https://your-gitea-instance.example.com"
  token: "REPLACE_ME_GITEA_TOKEN"  # 基础 token，必填（单账号部署只填这一项即可）
  tokens:
    review: ""     # 评审账号 token，留空回退到 token
    fix: ""        # 修复账号 token，留空回退到 token
    gen_tests: ""  # 测试生成账号 token，留空回退到 token
  # 自签名证书时设为 true。
  # 当前版本：该字段为预留配置，尚未接入 Gitea Client 的运行链路。
  insecure_skip_verify: false

# Webhook 配置
# 说明：webhook.secret 为必填项（用于签名校验）。
webhook:
  secret: "REPLACE_ME_WEBHOOK_SECRET"

# Claude 配置
# 说明：用于 Worker 容器内调用 Claude Code CLI（以环境变量注入）。
claude:
  api_key: "REPLACE_ME_CLAUDE_API_KEY"
  base_url: ""  # 代理或自定义端点，留空使用官方地址（如 https://api.anthropic.com）
  model: "claude-sonnet-4-6"  # 使用的模型，默认 claude-sonnet-4-6
  effort: "high"              # 推理强度：low / medium / high，默认 high

# Redis 配置
redis:
  addr: "localhost:6379"
  password: ""
  db: 0

# 数据库配置（SQLite，纯 Go 实现）
database:
  path: "data/dtworkflow.db"

# 日志配置
log:
  level: "info"    # debug / info / warn / error
  format: "text"   # text / json

# Worker 配置
worker:
  concurrency: 3
  # 全局兜底超时（asynq 任务级）。当 timeouts 中未配置对应任务类型时使用此值。
  timeout: "30m"
  image: "dtworkflow-worker:1.0"
  image_full: "dtworkflow-worker-full:latest"  # M3.4: 执行镜像（可选，不配则所有任务用 image）
  # maven_cache_volume: "dtworkflow-maven-cache"  # Maven 缓存 named volume（通常由 compose 环境变量注入）
  # npm_cache_volume: "dtworkflow-npm-cache"       # npm 缓存 named volume（通常由 compose 环境变量注入）
  cpu_limit: "2.0"
  memory_limit: "4g"
  network_name: "dtworkflow-net"
  # 按任务类型的硬超时（优先级高于 timeout 字段）
  # 同时作用于 asynq 任务级超时和 Worker 容器等待超时（两层使用相同默认值）。
  # 零值或不填则使用内置默认值：review_pr=10m, fix_issue=30m, gen_tests=20m。
  # 上限 24h，超过会被校验拦截。
  timeouts:
    review_pr: "15m"
    analyze_issue: "15m"   # M3.4: 只读分析
    fix_issue: "45m"       # M3.4: 含分析 + 修复 + 测试
    gen_tests: "30m"
  # 流式心跳监控（stream-json 活跃度检测）
  # 启用后容器内 claude -p 改用 stream-json 输出格式，
  # 通过监控 stdout 事件流检测容器是否卡住。
  # 关闭时退回到 --output-format json + 静态超时等待。
  stream_monitor:
    enabled: true
    activity_timeout: "2m"

# REST API 配置
# 说明：配置 api.tokens 后启用 REST API（/api/v1/*），支持手动触发评审/修复、查询任务等。
# 未配置 tokens 时 API 路由不注册，不影响 Webhook 功能。
api:
  tokens:
    # Token 格式要求：必须以 "dtw_" 开头，最少 16 个字符。identity 在所有 token 中必须唯一。
    # - token: "dtw_xxxxxxxxxxxxxxxx"   # Bearer Token（建议使用 openssl rand -hex 32 生成）
    #   identity: "ci-bot"              # 身份标识（记录到 triggered_by 字段）

# 通知配置（路由配置驱动）
# 说明：
# - default_channel 必须配置且已启用（当前版本支持 gitea / feishu 渠道）。
# - routes 用于按 repo / event 将通知发送到一个或多个渠道。
notify:
  default_channel: "gitea"
  channels:
    gitea:
      enabled: true
      # options 预留：后续支持企微/钉钉等渠道时可在此放置 token/webhook 等参数
      options: {}
    # 飞书自定义机器人（Webhook）通知渠道
    # 接入方式：在飞书群设置中添加自定义机器人，获取 Webhook URL。
    # 建议开启签名校验（secret），防止非法调用。
    feishu:
      enabled: false
      options:
        webhook_url: ""  # 飞书自定义机器人 Webhook URL
        secret: ""       # 签名密钥，留空则不启用签名校验（建议开启）
  routes:
    # 全局兜底：所有仓库/事件都发送到 gitea
    # 注意：gen_tests 的 started/done/failed 属于仓库级事件，没有 Issue/PR 编号，
    # Gitea 渠道会自动跳过；如需接收这类通知，建议额外配置 feishu 路由。
    - repo: "*"
      events: ["*"]
      channels: ["gitea"]
    # 如需同时发飞书通知，取消下方注释：
    # - repo: "*"
    #   events: ["pr.review.started", "pr.review.done", "system.error"]
    #   channels: ["feishu"]

# 全局评审配置
review:
  enabled: true
  # M2.5: severity 过滤阈值（仅回写高于此级别的问题）。
  # 可选值：critical / error / warning / info（从高到低）。
  # 留空或不填时等同于 info（不过滤任何问题）。
  severity: "warning"
  # M2.5: 文件忽略列表（glob 模式，支持 ** 递归匹配）。
  # 匹配的文件上发现的问题将被过滤，不出现在评审评论中。
  ignore_patterns:
    - "**/*.md"
    - "docs/**"
  # tech_stack: ["java", "vue"]        # 技术栈（留空则自动检测）
  # code_standards_paths: []            # 自定义编码规范文件路径（留空则使用默认扫描列表）

# 测试生成配置（M4.1）
# 说明：
# - enabled 为可选（未设置时默认启用）。当仓库级 test_gen.enabled 设为 false 时显式禁用。
# - module_scope 是"允许做 gen_tests 的模块前缀白名单"（护栏）；留空表示允许任意合法 module 路径。
# - max_retry_rounds 是容器内 Claude 自主修正测试失败的最大轮次，默认 3，合法范围 [1, 10]。
# - test_framework 显式指定测试框架（"junit5" / "vitest"）；留空则 resolveFramework 自动探测。
# - review_on_failure (M4.2/D5)：gen_tests 失败时是否也自动触发 review。默认 false（仅 Success=true 时触发）。
#   指针语义：不设置 = 使用默认 false；true/false = 显式覆盖。可在 per-repo overrides 覆盖。
test_gen:
  # enabled: true
  module_scope: ""          # 全局不限制；如 "backend" 表示仅允许 backend 前缀下的 module
  max_retry_rounds: 3       # 容器内 Claude 修正测试失败的最大轮次
  test_framework: ""        # 留空自动探测；可显式指定 "junit5" / "vitest"
  # review_on_failure: false  # 失败时是否也自动触发 review（D5）；默认 false
  # M4.3 变更驱动测试生成：PR 合并后自动分析变更代码并触发 gen_tests。
  # 默认关闭，需显式启用。启用时 test_gen.enabled 不能为 false（会被校验拦截）。
  # change_driven:
  #   enabled: false
  #   ignore_paths:         # 额外忽略的路径（doublestar glob 语法）
  #     - "scripts/**"
  #     # 注意：docs/、deploy/、.github/ 等已内置忽略，无需重复配置


# 仓库级配置覆盖示例
repos:
  - name: "acme/demo"
    notify:
      # 覆盖语义（与当前实现保持一致）：
      # - 写了 routes 字段：即视为"仓库级覆盖"（完全替换全局 notify.routes，不合并）
      # - routes: []：表示"显式清空"（该仓库不走任何通知路由）
      # - 不写 routes 字段：表示"继承全局 notify.routes"
      routes:
        - repo: "acme/demo"
          events: ["pr.review.done", "fix.issue.done", "system.error"]
          channels: ["gitea"]
    # 仓库级覆盖示例（同时发 gitea + feishu）：
    # routes:
    #   - repo: "acme/demo"
    #     events: ["pr.review.done", "pr.review.started", "system.error"]
    #     channels: ["gitea", "feishu"]
      # 仓库级飞书 Webhook 覆盖（可选）
      # 配置后该仓库的飞书通知将发送到独立的飞书群，未配置时使用全局飞书配置。
      # 前提：全局 notify.channels.feishu 已启用。
      # feishu:
      #   webhook_url: "https://open.feishu.cn/open-apis/bot/v2/hook/repo-xxx"
      #   secret: "repo-secret"  # 可选，无 secret 时不做签名校验
    review:
      # 仓库级评审配置覆盖语义：非空/非 nil 时覆盖全局对应字段。
      # severity 为空字符串时继承全局；ignore_patterns 为空切片 [] 时表示显式清空。
      enabled: false
      ignore_patterns: []
      # severity: "error"               # 仓库级 severity 阈值（留空则继承全局）
      # tech_stack: ["java"]
      # code_standards_paths:
      #   - "docs/java-standards.md"
      # model: "claude-opus-4-6"        # 仓库级模型覆盖（留空则继承 claude.model）
      # effort: "medium"                # 仓库级推理强度覆盖（留空则继承 claude.effort）
    test_gen:
      # 仓库级覆盖语义：
      # - enabled: 指针语义，未设置则继承全局；显式 false 时该仓库禁用 gen_tests。
      # - module_scope/test_framework: 非空字符串覆盖；空串表示继承全局。
      # - max_retry_rounds: > 0 时覆盖；= 0 时继承全局默认值 3。
      # - review_on_failure: 指针语义，未设置则继承全局；显式 true/false 覆盖（D5）。
      enabled: true
      # module_scope: "backend"          # 仓库级 module 白名单前缀
      # max_retry_rounds: 5              # 仓库级覆盖，[1, 10]
      # test_framework: "junit5"         # 强制仓库使用 JUnit 5
      # review_on_failure: true          # 仓库级：失败也触发 review（D5）
      # change_driven:
      #   enabled: true       # 仓库级启用变更驱动

# 每日评审统计报告
# 定时通过飞书发送前一天的 PR 评审统计摘要。
# 与实时通知的飞书 Webhook 独立配置，可发送到不同群。
daily_report:
  enabled: false                            # 启用开关
  cron: "0 9 * * *"                         # 定时触发表达式（默认每天 09:00）
  timezone: "Asia/Shanghai"                 # 触发时区
  skip_empty: false                         # 无评审活动时是否跳过发送（false = 发送简短心跳通知）
  feishu_webhook: ""                        # 飞书 Webhook URL
  feishu_secret: ""                         # 签名密钥（建议开启）
