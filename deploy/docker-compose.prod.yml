services:
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ${DEPLOY_DIR}/shared/redis:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - dtworkflow-net
    restart: unless-stopped

  dtworkflow:
    image: ${APP_IMAGE}
    command: ["serve", "--config", "/app/dtworkflow.yaml"]
    ports:
      - "0.0.0.0:8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    group_add:
      - "${DOCKER_GID}"
    environment:
      DTWORKFLOW_REDIS_ADDR: redis:6379
      DTWORKFLOW_DATABASE_PATH: /app/data/dtworkflow.db
      DTWORKFLOW_WORKER_IMAGE: ${WORKER_IMAGE}
      DTWORKFLOW_WORKER_IMAGE_FULL: ${WORKER_FULL_IMAGE}
      DTWORKFLOW_WORKER_MAVEN_CACHE_VOLUME: dtworkflow-maven-cache
    volumes:
      - ${DEPLOY_DIR}/dtworkflow.yaml:/app/dtworkflow.yaml:ro
      - ${DEPLOY_DIR}/shared/data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - dtworkflow-net
    restart: unless-stopped

volumes:
  maven-cache:
    name: dtworkflow-maven-cache

networks:
  dtworkflow-net:
    driver: bridge
